<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LER – Rassismus</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --blue:  #2E74B5;
      --blue2: #5a9fd4;
      --glow:  rgba(46,116,181,0.3);
      --bg:    #080c14;
      --text:  #e8eaf0;
      --sub:   #8892a4;
    }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      user-select: none; -webkit-user-select: none;
    }

    /* ── subtle bg glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 45% at 15% 65%, rgba(46,116,181,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 45% 35% at 85% 25%, rgba(46,116,181,0.05) 0%, transparent 70%);
    }

    /* ── TOP NAV ── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: center; gap: 10px;
      padding: 16px 20px 20px;
      background: linear-gradient(to bottom, rgba(8,12,20,0.97) 55%, transparent);
    }
    .tab {
      padding: 9px 30px; border-radius: 26px;
      border: 1.5px solid rgba(46,116,181,0.25);
      background: rgba(46,116,181,0.06);
      color: var(--sub); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      -webkit-transition: all 0.3s; transition: all 0.3s;
    }
    .tab.active {
      background: var(--blue); border-color: var(--blue);
      color: #fff; box-shadow: 0 4px 24px var(--glow);
    }

    /* ── VIEWPORT ── */
    #vp { position: fixed; inset: 0; overflow: hidden; }

    /* ── SLIDES ── */
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 76px 22px 88px;
      -webkit-transition: -webkit-transform 0.52s cubic-bezier(0.4,0,0.2,1), opacity 0.52s ease;
              transition:         transform 0.52s cubic-bezier(0.4,0,0.2,1), opacity 0.52s ease;
    }
    .slide.above  { -webkit-transform: translateY(-105%); transform: translateY(-105%); opacity: 0; }
    .slide.active { -webkit-transform: translateY(0);     transform: translateY(0);     opacity: 1; }
    .slide.below  { -webkit-transform: translateY(105%);  transform: translateY(105%);  opacity: 0; }
    .slide.instant { -webkit-transition: none !important; transition: none !important; }

    /* ── PANEL ── */
    .panel {
      position: relative; overflow: hidden;
      width: 100%; max-width: 650px;
      background: rgba(14,21,38,0.88);
      border: 1px solid rgba(46,116,181,0.14);
      border-radius: 26px; padding: 36px 32px 32px;
      -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
      box-shadow: 0 28px 72px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* big number watermark */
    .panel::before {
      content: attr(data-num);
      position: absolute; top: -14px; right: 18px;
      font-size: 110px; font-weight: 900; line-height: 1;
      letter-spacing: -6px; color: rgba(46,116,181,0.08);
      pointer-events: none;
    }

    /* top accent line */
    .panel::after {
      content: '';
      position: absolute; top: 0; left: 32px; right: 32px; height: 2px;
      background: linear-gradient(to right, var(--blue), rgba(46,116,181,0.15));
      border-radius: 0 0 2px 2px;
    }

    .q-tag {
      display: inline-flex; align-items: center;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
      background: rgba(46,116,181,0.14); border: 1px solid rgba(46,116,181,0.22);
      font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--blue2);
    }
    .q-text {
      font-size: clamp(17px, 3.8vw, 22px); font-weight: 700;
      line-height: 1.45; color: var(--text); margin-bottom: 28px;
    }
    .divider {
      height: 2px; border-radius: 2px; margin-bottom: 22px;
      background: linear-gradient(to right, var(--blue), rgba(46,116,181,0.08));
    }
    .a-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--sub); margin-bottom: 10px;
    }
    .a-text {
      font-size: clamp(14px, 3vw, 16px); color: #aab8cc; line-height: 1.78;
    }

    /* ── BOTTOM BAR ── */
    #bbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 28px 26px;
      display: flex; justify-content: space-between; align-items: flex-end;
      background: linear-gradient(to top, rgba(8,12,20,0.92) 55%, transparent);
      pointer-events: none;
    }
    .info-name { font-size: 13px; font-weight: 700; color: rgba(232,234,240,0.55); }
    .info-meta { font-size: 11px; color: var(--sub); margin-top: 3px; letter-spacing: 0.3px; }

    /* dots */
    #dots { display: flex; gap: 7px; align-items: center; }
    .dot {
      width: 7px; height: 7px; border-radius: 4px;
      background: rgba(255,255,255,0.16);
      -webkit-transition: all 0.3s; transition: all 0.3s;
    }
    .dot.on {
      width: 22px; background: var(--blue);
      box-shadow: 0 0 10px var(--glow);
    }

    /* ── SWIPE HINT ── */
    #hint {
      position: fixed; bottom: 72px; left: 50%;
      -webkit-transform: translateX(-50%); transform: translateX(-50%);
      z-index: 99; display: flex; flex-direction: column; align-items: center; gap: 6px;
      color: var(--sub); font-size: 12px; pointer-events: none;
      opacity: 0; -webkit-animation: hfade 3.5s ease 1.2s forwards; animation: hfade 3.5s ease 1.2s forwards;
    }
    .harrow {
      width: 2px; height: 28px; border-radius: 2px;
      background: linear-gradient(to bottom, transparent, var(--blue));
      -webkit-animation: ha 1.5s ease infinite; animation: ha 1.5s ease infinite;
    }
    @-webkit-keyframes hfade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
    @keyframes         hfade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
    @-webkit-keyframes ha { 0%,100%{-webkit-transform:translateY(0);opacity:.4} 50%{-webkit-transform:translateY(5px);opacity:1} }
    @keyframes         ha { 0%,100%{transform:translateY(0);opacity:.4}         50%{transform:translateY(5px);opacity:1}         }
  </style>
</head>
<body>

<nav id="nav">
  <button class="tab active" onclick="switchT(0)">Text 1</button>
  <button class="tab"        onclick="switchT(1)">Text 2</button>
</nav>

<div id="vp"></div>

<div id="bbar">
  <div>
    <div class="info-name">Simon Köper &middot; Klasse 9/1</div>
    <div class="info-meta">LER &middot; Herr Fernandez &middot; Gymnasium Berthold Brecht</div>
  </div>
  <div id="dots"></div>
</div>

<div id="hint"><span>wischen</span><div class="harrow"></div></div>

<script>
var D = [
  { cards: [
    { q:"Frage 1",
      question:"Warum werden die V\u00f6gel erst eingesperrt und dann soll man von ihnen lernen?",
      answer:"Das passt zu Rassismus, weil man Gruppen zuerst unterdr\u00fcckt (K\u00e4fig) und sie dann als \u201ebesonders\u201c oder \u201eexotisch\u201c darstellt, um sich selbst besser zu f\u00fchlen. Das zeigt, wie Unterdr\u00fcckung und Bewunderung gleichzeitig passieren k\u00f6nnen \u2013 und das ist im Grunde sehr egoistisch." },
    { q:"Frage 2",
      question:"Ist es ok zu sagen, man wei\u00df wie ein Vogel ist, nur weil man mit ihnen spielt?",
      answer:"Oft denken Menschen, sie verstehen eine andere Kultur oder Gruppe vollst\u00e4ndig, obwohl sie deren echte Probleme nie wirklich kennengelernt haben. Das ist wie bei Rassismus: Man bildet sich Vorurteile, ohne jemals wirklich mit diesen Menschen zu tun gehabt zu haben." },
    { q:"Frage 3",
      question:"Warum ist es \u201everr\u00fcckt\u201c, dass Singen und Tanzen so viel Macht hat?",
      answer:"Das erinnert an Vorurteile, bei denen man bestimmten Gruppen nur Talent f\u00fcr Musik oder Sport zuschreibt, statt sie als genauso klug oder f\u00e4hig anzusehen. Das sind keine Fakten \u2013 das sind Vorurteile, die Menschen auf bestimmte Eigenschaften reduzieren." }
  ]},
  { cards: [
    { q:"Frage 1",
      question:"Warum muss Mowgli extra \u201eMeisterworte\u201c lernen, um im Dschungel sicher zu sein?",
      answer:"Das ist vergleichbar mit Rassismus, wenn unterdr\u00fcckte Gruppen sich anpassen und fremde Regeln lernen m\u00fcssen, nur damit sie nicht angegriffen oder verachtet werden." },
    { q:"Frage 2",
      question:"Ist es rassistisch, dass Baloo sagt, Mowgli ist kein \u201eBaumstumpf\u201c zum Krallensch\u00e4rfen?",
      answer:"Hier wird Mowgli nur \u00fcber seinen K\u00f6rper definiert \u2013 fast wie ein Objekt oder ein Sklave. Er wird nicht als gleichwertiges Wesen behandelt, sondern nur nach seinem Nutzen bewertet." },
    { q:"Frage 3",
      question:"Warum sagt Baloo, dass die Sch\u00fcler ihm nie danken?",
      answer:"Das bedient das Vorurteil, dass die \u201e\u00fcberlegene\u201c Gruppe glaubt, sie tue den anderen etwas Gutes \u2013 zum Beispiel durch Bildung. Dabei wirkt es dann so, als w\u00e4ren die anderen undankbar, obwohl das System von Anfang an ungerecht ist." },
    { q:"Frage 4",
      question:"Warum muss Mowgli den \u201eAkzent des B\u00e4ren\u201c nutzen, um dazuzugeh\u00f6ren?",
      answer:"Das zeigt, dass man nur akzeptiert wird, wenn man die Identit\u00e4t der Mehrheit \u00fcbernimmt und die eigene Herkunft versteckt. Das ist \u00e4hnlich wie bei Sprache und Kultur: Alles, was fremd ist, wird abgelehnt." },
    { q:"Frage 5",
      question:"Warum ist Schutz im Dschungel von \u201eMeisterworten\u201c abh\u00e4ngig?",
      answer:"Das System ist unfair. Wer die Regeln der Herrschenden nicht kennt, hat keinen Anspruch auf Schutz \u2013 das ist eine rassistische Machtstruktur, die Au\u00dfenseiter bewusst benachteiligt." }
  ]}
];

var vp     = document.getElementById('vp');
var dotsEl = document.getElementById('dots');
var tabs   = document.querySelectorAll('.tab');

var curT    = 0;
var curC    = [0, 0];
var busy    = false;
var slides  = [];

// Build slides
for (var t = 0; t < D.length; t++) {
  var ts = [];
  for (var c = 0; c < D[t].cards.length; c++) {
    var card = D[t].cards[c];
    var el = document.createElement('div');
    el.className = 'slide below instant';
    el.style.display = 'none';
    el.innerHTML =
      '<div class="panel" data-num="0' + (c+1) + '">' +
        '<div class="q-tag">' + card.q + '</div>' +
        '<div class="q-text">' + card.question + '</div>' +
        '<div class="divider"></div>' +
        '<div class="a-tag">Begr\u00fcndung</div>' +
        '<div class="a-text">' + card.answer + '</div>' +
      '</div>';
    vp.appendChild(el);
    ts.push(el);
  }
  slides.push(ts);
}

function pc(i, a) { return i < a ? 'above' : i === a ? 'active' : 'below'; }

function updateDots(t) {
  var n = D[t].cards.length, a = curC[t];
  dotsEl.innerHTML = '';
  for (var i = 0; i < n; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === a ? ' on' : '');
    dotsEl.appendChild(d);
  }
}

function showText(t, anim) {
  var cs = slides[t], a = curC[t];
  for (var i = 0; i < cs.length; i++) {
    cs[i].style.display = '';
    cs[i].className = 'slide below instant';
  }
  if (!anim) {
    // force reflow then set instant positions
    cs[0] && cs[0].offsetHeight;
    for (var i = 0; i < cs.length; i++) cs[i].className = 'slide ' + pc(i, a) + ' instant';
    updateDots(t);
    return;
  }
  // reflow, then animate active card in from below; others snap to position
  cs[0] && cs[0].offsetHeight;
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      for (var i = 0; i < cs.length; i++) {
        if (i === a) cs[i].className = 'slide active'; // animate from below
        else         cs[i].className = 'slide ' + pc(i, a) + ' instant';
      }
      updateDots(t);
    });
  });
}

function hideText(t) {
  var cs = slides[t];
  for (var i = 0; i < cs.length; i++) {
    cs[i].style.display = 'none';
    cs[i].className = 'slide below instant';
  }
}

function switchT(t) {
  if (t === curT) return;
  hideText(curT);
  curT = t;
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', i === t);
  showText(t, true);
}

function go(dir) {
  if (busy) return;
  var n = D[curT].cards.length, next = curC[curT] + dir;
  if (next < 0 || next >= n) return;
  busy = true;
  curC[curT] = next;
  var cs = slides[curT];
  for (var i = 0; i < cs.length; i++) cs[i].className = 'slide ' + pc(i, next);
  updateDots(curT);
  setTimeout(function() { busy = false; }, 580);
}

// Init
showText(0, false);

// Touch
var ty0 = 0, tx0 = 0;
document.addEventListener('touchstart', function(e) {
  ty0 = e.touches[0].clientY; tx0 = e.touches[0].clientX;
}, { passive: true });
document.addEventListener('touchend', function(e) {
  var dy = ty0 - e.changedTouches[0].clientY;
  var dx = Math.abs(tx0 - e.changedTouches[0].clientX);
  if (Math.abs(dy) > 48 && Math.abs(dy) > dx) go(dy > 0 ? 1 : -1);
}, { passive: true });

// Wheel
var wLock = false;
document.addEventListener('wheel', function(e) {
  e.preventDefault();
  if (wLock || Math.abs(e.deltaY) < 12) return;
  wLock = true;
  go(e.deltaY > 0 ? 1 : -1);
  setTimeout(function() { wLock = false; }, 650);
}, { passive: false });

// Keys
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  go(-1);
  if (e.key === '1') switchT(0);
  if (e.key === '2') switchT(1);
});
</script>
</body>
</html>
